# GenreMaster Default Training Configuration

# Experiment metadata
experiment:
  name: "genremaster-main"
  description: "Genre-conditioned automatic mastering"
  seed: 42

# Dataset configuration
data:
  root_dir: "/Users/I558118/Documents/Projects/GenreMaster/data"
  audio_dir: "/Volumes/LLModels/Datasets/fma_medium"
  sample_rate: 44100
  duration: 30.0  # seconds
  top_k_genres: 16
  samples_per_genre: 1500

  # For quick testing, set n_train_samples to limit dataset size
  # Set to null for full dataset
  n_train_samples: 100  # Use 100 samples for quick testing
  n_val_samples: 20

  # Pre-master simulation
  target_lufs: -18.0
  augment_train: true

# Model configuration
model:
  encoder_type: "lightweight"  # or "resnet"
  audio_feature_dim: 512
  genre_latent_dim: 128
  conditioned: true  # Set false for unconditioned baseline

# Training configuration
training:
  batch_size: 4
  num_epochs: 50  # Start with 50 epochs for testing
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5

  # Learning rate schedule
  lr_scheduler: "cosine"  # or "step", "none"
  warmup_epochs: 5

  # Gradient clipping
  grad_clip: 1.0

  # Checkpointing
  save_every: 5  # Save checkpoint every N epochs
  keep_last_n: 3  # Keep only last N checkpoints

  # Early stopping
  patience: 15  # Stop if no improvement for N epochs
  min_delta: 1.0e-4

# Loss configuration
loss:
  weights:
    loudness: 1.0
    spectral: 0.5
    dynamic: 0.5
    perceptual: 0.1

# Optimizer configuration
optimizer:
  name: "adam"  # or "adamw", "sgd"
  betas: [0.9, 0.999]
  eps: 1.0e-8

# Device configuration
device:
  type: "auto"  # auto-detect, or "cuda", "mps", "cpu"
  num_workers: 0  # DataLoader workers (0 = single-threaded)

# Logging configuration
logging:
  use_trackio: true
  log_every: 10  # Log metrics every N steps
  save_audio_every: 100  # Save audio samples every N steps

  # Trackio config
  trackio:
    project: "genremaster"
    experiment: "main-training"

# Output paths
output:
  checkpoint_dir: "results/checkpoints"
  log_dir: "results/logs"
  audio_dir: "results/audio_samples"
