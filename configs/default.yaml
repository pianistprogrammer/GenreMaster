# GenreMaster Training Configuration (GTZAN Dataset)

# Experiment metadata
experiment:
  name: "genremaster-gtzan"
  description: "Genre-conditioned automatic mastering with GTZAN"
  seed: 42

# Dataset configuration
data:
  dataset: "gtzan"  # Use GTZAN instead of FMA
  root_dir: "/Users/I558118/Documents/Projects/GenreMaster/data"
  audio_dir: "/Volumes/LLModels/Datasets/gtzan"
  sample_rate: 22050  # GTZAN native sample rate
  duration: 30.0  # seconds
  n_genres: 10

  # Pre-master simulation
  target_lufs: -18.0
  augment_train: true

# Model configuration
model:
  encoder_type: "lightweight"  # or "resnet"
  audio_feature_dim: 512
  genre_latent_dim: 128
  conditioned: true  # Set false for unconditioned baseline
  n_genres: 10  # GTZAN has 10 genres

# Training configuration
training:
  batch_size: 4
  num_epochs: 50
  learning_rate: 1.0e-5  # Reduced from 1e-4 to prevent gradient explosion
  weight_decay: 1.0e-5

  # Learning rate schedule
  lr_scheduler: "cosine"
  warmup_epochs: 5

  # Gradient clipping (more aggressive)
  grad_clip: 0.5

  # Checkpointing
  save_every: 5
  keep_last_n: 3

  # Early stopping
  patience: 15
  min_delta: 1.0e-4

# Loss configuration
loss:
  weights:
    loudness: 1.0
    spectral: 0.5
    dynamic: 0.5
    perceptual: 0.1  # Re-enabled with CPU STFT for MPS compatibility

# Optimizer configuration
optimizer:
  name: "adam"
  betas: [0.9, 0.999]
  eps: 1.0e-8

# Device configuration
device:
  type: "auto"
  num_workers: 0

# Logging configuration
logging:
  use_trackio: true
  log_every: 10
  save_audio_every: 100

  trackio:
    project: "genremaster"
    experiment: "gtzan-mastering"

# Output paths
output:
  checkpoint_dir: "results/checkpoints"
  log_dir: "results/logs"
  audio_dir: "results/audio_samples"
